# Recipe: unsloth/Qwen3.6-35B-A3B-NVFP4
# Qwen/Qwen3.5-35B-A3B model in native FP8 format


recipe_version: "1"
name: Qwen3.6-35B-A3B-NVFP4
description: vLLM serving Qwen3.6-35B-A3B-NVFP4
runtime: vllm
# HuggingFace model to download (optional, for --download-model)
model: nvidia/Qwen3.6-35B-A3B-NVFP4

solo_only: true

# Container image to use
container: vllm-node

# Mod required to fix slowness and crash in the cluster (tracking https://github.com/vllm-project/vllm/issues/33857)
mods:
  - mods/fix-qwen3-coder-next
  - mods/fix-qwen3.5-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 8000
  host: 0.0.0.0
  tensor_parallel: 1
  gpu_memory_utilization: 0.5
  max_model_len: 262144
  max_num_batched_tokens: 16384

# Environment variables
env: {}

# The vLLM serve command template
command: |
  vllm serve nvidia/Qwen3.6-35B-A3B-NVFP4 \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-num-seqs 4 \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_xml \
    --trust-remote-code \
    --kv-cache-dtype fp8 \
    --load-format fastsafetensors \
    --attention-backend flashinfer \
    --enable-chunked-prefill \
    --async-scheduling \
    --enable-prefix-caching \
    --chat-template unsloth.jinja \
    --reasoning-parser qwen3 \
    --moe_backend marlin \
    --language-model-only \
    --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'  \
    --max-num-seqs 4 \
    -tp {tensor_parallel}
